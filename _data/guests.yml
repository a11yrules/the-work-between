  bio: "Nic Steenhout is the host and creator of The Work Between. A quilter, bird photographer, and sketcher, he brings his own creative practice to every conversation on the show. He has spent more than 25 years working in web accessibility as a speaker, trainer, and consultant. He has worked with disabled people, non-profits, government organizations, and corporations across three continents. He also hosts A11y Rules, a podcast dedicated to web accessibility. Nic lives and works in British Columbia."
