  bio: "Sina runs an accessibility firm called Prime Access Consulting. We do a lot of work with organizations especially in the cultural heritage sectors, like museums, and non-profits oriented around that space but also with start-ups and universities and larger companies on digital accessibility, whether that's web accessibility, iPhone apps, digital interactives that involve large touch interfaces in museums, and applying the principles of inclusive and universal design to that so those types of experiences and technologies are available to the widest possible audience."
