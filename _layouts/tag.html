---
layout: default
---

<div class="page-heading">
  <h1 class="container">{{ page.tag }}</h1>
</div>
<div class="container">
<p>{{ page.intro }}</p>
<ul>
{% for post in site.tags[page.tag] %}
  <li>
   <a href="{{ post.url }}">{{ post.title }}</a> -  {{ post.date | date: "%B %d, %Y" }}
  </li>
{% endfor %}
</ul>
</div>
